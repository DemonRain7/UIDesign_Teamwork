<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
        <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    </head>

    <body {% if show_home_nav %}class="with_nav"{% endif %}>
        {% if show_home_nav %}
        <div class="top_nav top_nav_stepper">
            <button type="button" class="top_nav_back" onclick="if(history.length>1){history.back();}else{window.location='/';}">← Back</button>
            <a href="/" class="top_nav_home">⌂ Home</a>
            <div class="path_stepper">
                {% for node in stepper_nodes %}
                <div class="stepper_node {% if node.key == stepper_current %}active{% elif node.done %}done{% endif %}">
                    <div class="stepper_dot">{% if node.done %}✓{% endif %}</div>
                    <div class="stepper_label">{{ node.label }}</div>
                </div>
                {% if not loop.last %}
                <div class="stepper_line {% if node.done %}done{% endif %}"></div>
                {% endif %}
                {% endfor %}
            </div>
        </div>
        {% endif %}

        {% block content %}
        <!-- Default content or a placeholder for child pages -->
        {% endblock %}

        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-1.12.4.js"></script>

        <!-- bootstrap cdn files -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.min.js" integrity="sha384-pQQkAEnwaBkjpqZ8RU1fF1AKtTcHJwFl3pblpTlHXybJjHpMYo79HY3hIi4NKxyj" crossorigin="anonymous"></script>

        <!-- custom code -->
        {% block scripts %}{% endblock %}
        <script>
            // Global Enter-to-continue: fires on any page that has a .js_enter element,
            // but only when the quiz question form (#quiz_form) is NOT present —
            // that page handles its own keyboard shortcuts via logQuiz.js.
            $(document).on('keydown', function (e) {
                if ($('#quiz_form').length) return;
                if (e.key !== 'Enter') return;
                var tag = (e.target && e.target.tagName) ? e.target.tagName.toUpperCase() : '';
                if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'BUTTON' || tag === 'A') return;
                var $el = $('.js_enter').first();
                if ($el.length) { e.preventDefault(); $el[0].click(); }
            });
        </script>
    </body>
</html>
