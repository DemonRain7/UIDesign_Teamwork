<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#C8C0A8"/>
  <rect x="0" y="270" width="600" height="110" fill="#A8A090" opacity="0.4"/>
  <!-- round ceramic/stone plate, white -->
  <ellipse cx="300" cy="215" rx="220" ry="84" fill="#F8F4EC" opacity="0.96"/>
  <ellipse cx="300" cy="210" rx="206" ry="74" fill="#FEFCF8" opacity="0.98"/>
  <!-- raw fish slices (translucent, pale pink) — sashimi-like -->
  <ellipse cx="190" cy="200" rx="52" ry="16" fill="#F0D8C8" opacity="0.88" transform="rotate(-8,190,200)"/>
  <ellipse cx="240" cy="192" rx="54" ry="16" fill="#EED0C0" opacity="0.85" transform="rotate(4,240,192)"/>
  <ellipse cx="295" cy="197" rx="52" ry="15" fill="#F0D4C4" opacity="0.88" transform="rotate(-5,295,197)"/>
  <ellipse cx="348" cy="193" rx="50" ry="15" fill="#EED2C0" opacity="0.85" transform="rotate(7,348,193)"/>
  <ellipse cx="400" cy="199" rx="48" ry="15" fill="#F0D6C6" opacity="0.85" transform="rotate(-4,400,199)"/>
  <!-- second layer slightly offset -->
  <ellipse cx="210" cy="222" rx="50" ry="15" fill="#ECD0BC" opacity="0.82" transform="rotate(6,210,222)"/>
  <ellipse cx="265" cy="218" rx="52" ry="15" fill="#F0D4C4" opacity="0.82" transform="rotate(-8,265,218)"/>
  <ellipse cx="320" cy="220" rx="50" ry="15" fill="#ECD2BC" opacity="0.82" transform="rotate(5,320,220)"/>
  <ellipse cx="372" cy="216" rx="48" ry="15" fill="#EED0BC" opacity="0.8" transform="rotate(-6,372,216)"/>
  <!-- peanut oil sheen (very subtle) -->
  <ellipse cx="290" cy="205" rx="90" ry="28" fill="#E8C870" opacity="0.08"/>
  <!-- shredded ginger and scallion on top -->
  <rect x="220" y="195" width="34" height="3" rx="2" fill="#EECA6A" opacity="0.82" transform="rotate(-15,237,197)"/>
  <rect x="295" y="190" width="30" height="3" rx="2" fill="#EECA6A" opacity="0.8" transform="rotate(10,310,192)"/>
  <rect x="358" y="194" width="28" height="3" rx="2" fill="#EECA6A" opacity="0.8" transform="rotate(-8,372,196)"/>
  <rect x="240" y="218" width="32" height="3" rx="2" fill="#78B848" opacity="0.75" transform="rotate(8,256,220)"/>
  <rect x="330" y="215" width="30" height="3" rx="2" fill="#78B848" opacity="0.72" transform="rotate(-12,345,217)"/>
  <!-- chrysanthemum / sesame oil drop hints -->
  <circle cx="270" cy="205" r="3" fill="#C8A030" opacity="0.5"/>
  <circle cx="330" cy="200" r="3" fill="#C8A030" opacity="0.48"/>
  <!-- label -->
  <rect x="100" y="308" width="400" height="44" rx="6" fill="#2A2418" opacity="0.58"/>
  <text x="300" y="336" font-family="Georgia, serif" font-size="17" fill="#F5F0E1" text-anchor="middle" font-weight="bold">Shunde Raw Fish (顺德鱼生)</text>
</svg>
