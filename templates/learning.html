{% extends "layout.html" %}

{% block scripts %}
    <script>
        const learningContents = {{ lesson | tojson }};
        const LESSON_ID = {{ lesson_number }};
        const TOTAL_LESSONS = {{ total_lessons }};
    </script>
    <script src="{{ url_for('static', filename='logLearning.js') }}"></script>
{% endblock %}

{% block content %}
<div class="main_container quiz_wide">
    <div class="learn_container">

        <div class="progress_header">
            <div class="progress_label" id="learn_progress_label"></div>
            <div class="progress_track">
                <div class="progress_fill" id="learn_progress_fill"></div>
            </div>
        </div>

        <div class="learn_header">
            <h1 class="learn_title" id="learning_title_container"></h1>
            <p class="learn_subtitle" id="learning_beginning_container"></p>
        </div>

        <div class="learn_body">
            <div id="learing_table_container"></div>
            <div class="learn_image_grid">
                <div id="learning_image_0_container"></div>
                <div id="learning_image_1_container"></div>
                <div id="learning_image_2_container"></div>
                <div id="learning_image_3_container"></div>
            </div>
        </div>

        <div class="learn_nav">
            <button type="button" class="learn_btn" id="prev_button">← Prev</button>
            <button type="button" class="learn_btn learn_btn_primary" id="next_button">Next →</button>
        </div>

    </div>
</div>
{% endblock %}
