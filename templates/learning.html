{% extends "layout.html" %}

{% block scripts %}
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script>
        const learningContents = {{ lesson | tojson }};
        const LESSON_ID = {{ lesson_number }};
        const TOTAL_LESSONS = {{ total_lessons }};
    </script>
    <script src="{{ url_for('static', filename='logLearning.js') }}"></script>
{% endblock %}

{% block content %}
<div class="main_container">
    <div id="learning_container">
        <div class="row" id="learning_title_container"></div>
        <div class="row" id="learning_beginning_container"></div>
        <div class="row">
            <div class="col-6" id="learing_table_container"></div>
            <div class="col-6">
                <div class="row">
                    <div class="col-6" id="learning_image_0_container"></div>
                    <div class="col-6" id="learning_image_1_container"></div>
                </div>
                <div class="row">
                    <div class="col-6" id="learning_image_2_container"></div>
                    <div class="col-6" id="learning_image_3_container"></div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-2">
                <button type="button" class="btn btn-primary" id="prev_button">Prev</button>
            </div>
            <div class="col-8"></div>
            <div class="col-2">
                <button type="button" class="btn btn-primary" id="next_button">Next</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
